<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Колесо Фортуны</title>
    <!-- Подключаем SDK Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Подключаем плеер для Lottie (dotlottie / lottie-web) -->
    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-touch-callout: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #171719;
            color: white;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .wheel-container {
            position: relative;
            width: 320px;
            height: 320px;
            z-index: 10;
        }

        /* Указатель сверху */
        .pointer-svg {
            position: absolute;
            top: -24px;
            left: 50%;
            transform: translateX(-50%);
            width: 36px;
            height: 36px;
            z-index: 20;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.4));
        }

        /* Верхняя плашка */
        .top-label {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #00a8ff, #0077ff);
            color: white;
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 800;
            text-decoration: none;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(0, 168, 255, 0.4), inset 0 2px 5px rgba(255, 255, 255, 0.3);
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
            z-index: 50;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }

        .top-label:active {
            transform: translateX(-50%) scale(0.95);
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            /* Градиент в точности как на фото, с немного замытыми краями у чёрного сектора */
            background: conic-gradient(from 0deg,
                    #ffca00 0deg, #ffca00 30deg,
                    #2a2a2d 40deg, #2a2a2d 140deg,
                    #7c12ff 150deg, #b038ff 220deg, #ffca00 360deg);
            position: relative;
            transition: transform 5s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform: rotate(0deg);
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.05), inset 0 0 10px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        /* Выпуклый эффект и тень внутри */
        .wheel::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 50%;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            z-index: 10;
        }

        .prize-image {
            position: absolute;
            top: 50%;
            left: 50%;
            /* Позиционируем слева по центру фиолетового сектора */
            transform: translate(-50%, -50%) translate(-100px, 0);
            width: 55px;
            height: 55px;
            object-fit: contain;
            pointer-events: none;
            z-index: 5;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.4));
        }

        .center-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #00a8ff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 26px;
            font-weight: 900;
            color: white;
            cursor: pointer;
            z-index: 15;
            box-shadow: 0 0 20px rgba(0, 168, 255, 0.5), inset 0 4px 10px rgba(255, 255, 255, 0.3);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            transition: transform 0.1s;
        }

        .center-button:active {
            transform: translate(-50%, -50%) scale(0.92);
        }

        /* Крестообразные звездочки */
        .star {
            position: absolute;
            background: white;
            clip-path: polygon(35% 0, 65% 0, 65% 35%, 100% 35%, 100% 65%, 65% 65%, 65% 100%, 35% 100%, 35% 65%, 0 65%, 0 35%, 35% 35%);
            animation: twinkle 2s infinite ease-in-out;
            opacity: 0;
            pointer-events: none;
        }

        @keyframes twinkle {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            50% {
                transform: scale(1) rotate(45deg);
                opacity: 1;
                filter: drop-shadow(0 0 5px white);
            }

            100% {
                transform: scale(0) rotate(90deg);
                opacity: 0;
            }
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background: #202022;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            transform: scale(0.8) translateY(20px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 80%;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1) translateY(0);
        }

        .modal-title {
            font-size: 24px;
            margin-bottom: 25px;
            color: white;
            font-weight: 700;
        }

        .modal-btn {
            padding: 12px 30px;
            background: #00a8ff;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 168, 255, 0.3);
            transition: opacity 0.2s, transform 0.2s;
        }

        .modal-btn:active {
            transform: scale(0.95);
            opacity: 0.8;
        }

        /* Экран загрузки */
        .preloader {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #171719;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease-out;
        }

        .preloader.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #00a8ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* Фоновые звездочки-искорки */
        .bg-stars-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .bg-star {
            position: absolute;
            background: rgb(255, 255, 255);
            /* Прозрачность теперь задается через JS */
            clip-path: polygon(35% 0, 65% 0, 65% 35%, 100% 35%, 100% 65%, 65% 65%, 65% 100%, 35% 100%, 35% 65%, 0 65%, 0 35%, 35% 35%);
            animation: floatUp linear infinite;
            bottom: -20px;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(0) rotate(0deg);
                opacity: 0 !important;
            }

            10% {
                transform: translateY(-10vh) scale(1) rotate(45deg);
                filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.3));
            }

            90% {
                transform: translateY(-90vh) scale(1) rotate(315deg);
                filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.2));
            }

            100% {
                transform: translateY(-100vh) scale(0) rotate(360deg);
                opacity: 0 !important;
            }
        }
    </style>
</head>

<body>

    <!-- Прелоадер -->
    <div class="preloader" id="preloader">
        <div class="spinner"></div>
    </div>

    <!-- Контейнер для фоновых звездочек-искорок -->
    <div class="bg-stars-container" id="bgStars"></div>

    <!-- Верхняя плашка-ссылка -->
    <a href="https://t.me/randomnygiftsbot" class="top-label" target="_blank"
        onclick="tg.openTelegramLink('https://t.me/randomnygiftsbot'); return false;">
        Gifts cases
        <div class="star" style="top: 8px; left: 10px; width: 8px; height: 8px; animation-delay: 0.2s;"></div>
        <div class="star" style="bottom: 8px; right: 8px; width: 6px; height: 6px; animation-delay: 1.5s;"></div>
        <div class="star" style="top: 15px; left: 50%; width: 5px; height: 5px; animation-delay: 0.8s;"></div>
    </a>

    <div class="wheel-container">
        <!-- Указатель -->
        <svg class="pointer-svg" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
            <path d="M 4 4 L 36 4 L 20 32 Z" fill="#171719" stroke="white" stroke-width="4" stroke-linejoin="round" />
        </svg>

        <div class="wheel" id="wheel">
            <img src="Ion Gem.png" alt="Приз" class="prize-image" onerror="this.style.display='none'">
        </div>

        <!-- Кнопка по центру со звездочками -->
        <div class="center-button" id="spinBtn">
            Spin
            <div class="star" style="top: 15px; left: 15px; width: 12px; height: 12px; animation-delay: 0s;"></div>
            <div class="star" style="top: 28px; right: 15px; width: 15px; height: 15px; animation-delay: 0.6s;"></div>
            <div class="star" style="bottom: 15px; left: 35px; width: 10px; height: 10px; animation-delay: 1.2s;"></div>
            <div class="star" style="bottom: 25px; right: 20px; width: 8px; height: 8px; animation-delay: 0.3s;"></div>
            <div class="star" style="top: 10px; left: 45px; width: 9px; height: 9px; animation-delay: 0.9s;"></div>
            <div class="star" style="bottom: 10px; right: 45px; width: 11px; height: 11px; animation-delay: 1.5s;">
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <!-- Анимация Lottie -->
            <dotlottie-player 
                src="https://raw.githubusercontent.com/vovashmyhol/koleso/refs/heads/main/%D0%BF%D1%80%D0%BE%D0%B8%D0%B3%D1%80%D1%8B%D1%88.json" 
                background="transparent" 
                speed="1" 
                style="width: 200px; height: 200px; margin: 0 auto 15px auto;" 
                loop 
                autoplay>
            </dotlottie-player>
            <div class="modal-title">Вы ничего не выиграли 😢</div>
            <button class="modal-btn" onclick="closeModal()">Закрыть</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        // Устанавливаем цвет шапки и фона Mini App в цвет нашего сайта (#171719)
        if (tg.setHeaderColor) {
            tg.setHeaderColor('#171719');
        }
        if (tg.setBackgroundColor) {
            tg.setBackgroundColor('#171719');
        }
        tg.ready();

        // Логика скрытия прелоадера после полной загрузки страницы (всех картинок, скриптов, Lottie и т.д.)
        window.addEventListener('load', () => {
            const preloader = document.getElementById('preloader');
            // Небольшая задержка для плавности, чтобы гарантированно убрать экран загрузки
            setTimeout(() => {
                preloader.classList.add('hidden');
            }, 300);
        });

        const spinBtn = document.getElementById('spinBtn');
        const wheel = document.getElementById('wheel');
        const modal = document.getElementById('modal');
        let isSpinning = false;
        let currentRotation = 0;

        spinBtn.addEventListener('click', () => {
            if (isSpinning) return;

            const invoiceUrl = 'https://t.me/$ceRqoYKZqEmcFQAAOnX9FhWo_6M';

            // Проверяем доступность API оплат Telegram
            if (tg.openInvoice) {
                tg.openInvoice(invoiceUrl, function (status) {
                    if (status === 'paid') {
                        startSpin();
                    } else {
                        tg.showAlert('Оплата не была завершена.');
                    }
                });
            } else {
                // Фолбэк для тестирования вне Telegram
                console.log("Invoice API не доступно. Запускаем колесо для теста.");
                startSpin();
            }
        });

        function startSpin() {
            isSpinning = true;

            // Сектор "No Loot" находится примерно от 35 до 145 градусов (центр ~90 градусов).
            // Чтобы центр сектора (90deg) остановился строго под курсором (0deg),
            // нужно повернуть колесо так, чтобы оно сделало несколько полных оборотов и сместилось на -90 (т.е. +270).
            const targetOffset = 270;

            // Вычисляем базовое количество оборотов с учетом текущего угла, добавим 5 кругов (1800deg) для эффекта вращения
            const baseSpins = Math.floor(currentRotation / 360) * 360 + 1800;

            currentRotation = baseSpins + targetOffset;

            wheel.style.transform = `rotate(${currentRotation}deg)`;

            // Ждем завершения анимации вращения (5 секунд как в CSS)
            setTimeout(() => {
                isSpinning = false;
                modal.classList.add('active');
            }, 5000);
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        // --- Логика фоновых звездочек-искорок ---
        function createBgStar() {
            const star = document.createElement('div');
            star.classList.add('bg-star');

            // Рандомизация параметров
            const size = Math.random() * 8 + 4; // от 4px до 12px
            const left = Math.random() * 100; // позиция по горизонтали
            const duration = Math.random() * 6 + 7; // Было [4, 7], стало от 7s до 13s (медленнее)
            const opacity = Math.random() * 0.25 + 0.05; // от 5% до 30% прозрачности

            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.left = `${left}%`;
            star.style.animationDuration = `${duration}s`;
            star.style.opacity = opacity;

            document.getElementById('bgStars').appendChild(star);

            // Удаляем элемент после завершения анимации
            setTimeout(() => {
                star.remove();
            }, duration * 1000);
        }

        // Создаем звездочки каждые 200 миллисекунд
        setInterval(createBgStar, 200);
    </script>

</body>

</html>
